networks:
  food-delivery-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  # Added: Shared volume for all Maven dependencies
  maven-repo:

services:
  postgres:
    image: postgres:16-alpine
    container_name: food-delivery-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?ERROR- POSTGRES_USER environment variable is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?ERROR- POSTGRES_PASSWORD environment variable is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - food-delivery-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: food-delivery-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:?ERROR- RABBIT_USER environment variable is required}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD:?ERROR- RABBIT_PASSWORD environment variable is required}
    ports:
      - "${RABBIT_PORT:-5672}:${RABBIT_PORT:-5672}"
      - "${RABBIT_MGMT_PORT:-15672}:${RABBIT_MGMT_PORT:-15672}"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - food-delivery-net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: food-delivery-redis
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    volumes:
      - redis-data:/data
    networks:
      - food-delivery-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile.dev
    container_name: eureka-server
    volumes:
      - maven-repo:/root/.m2 # Persist dependencies
    develop:
      watch:
        - action: sync+restart
          path: ./eureka-server/src
          target: /app/src
        - action: rebuild
          path: ./eureka-server/pom.xml
    ports:
      - "${EUREKA_PORT:-8761}:${EUREKA_PORT:-8761}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_PORT: ${EUREKA_PORT:-8761}
    networks:
      - food-delivery-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--spider",
          "http://localhost:${EUREKA_PORT:-8761}/actuator/health",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  customer-service:
    build:
      context: ./customer-service
      dockerfile: Dockerfile.dev
    container_name: customer-service
    volumes:
      - maven-repo:/root/.m2 # Persist dependencies
    develop:
      watch:
        - action: sync+restart
          path: ./customer-service/src
          target: /app/src
        - action: rebuild
          path: ./customer-service/pom.xml
    ports:
      - "${CUSTOMER_PORT:-8081}:${CUSTOMER_PORT:-8081}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CUSTOMER_PORT: ${CUSTOMER_PORT:-8081}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?ERROR- JWT_SECRET environment variable is required}
    networks:
      - food-delivery-net
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--spider",
          "http://localhost:${CUSTOMER_PORT:-8081}/actuator/health",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  restaurant-service:
