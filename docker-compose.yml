    ports:
      - "${GATEWAY_PORT:-8080}:${GATEWAY_PORT:-8080}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_PORT: ${GATEWAY_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - food-delivery-net
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      delivery-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--spider",
          "http://localhost:${GATEWAY_PORT:-8080}/actuator/health",
