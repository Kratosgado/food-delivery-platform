      RABBIT_USER: ${RABBIT_USER}
      RABBIT_PASSWORD: ${RABBIT_PASSWORD}
    networks:
      - food-delivery-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--spider",
          "http://localhost:${DELIVERY_PORT:-8084}/actuator/health",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.dev
    container_name: api-gateway
    volumes:
      - maven-repo:/root/.m2 # Persist dependencies
    develop:
      watch:
        - action: sync+restart
          path: ./api-gateway/src
          target: /app/src
        - action: rebuild
