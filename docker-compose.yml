          target: /app/src
        - action: rebuild
          path: ./restaurant-service/pom.xml
    ports:
      - "${RESTAURANT_PORT:-8082}:${RESTAURANT_PORT:-8082}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      RESTAURANT_PORT: ${RESTAURANT_PORT:-8082}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - food-delivery-net
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--spider",
          "http://localhost:${RESTAURANT_PORT:-8082}/actuator/health",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile.dev
    container_name: order-service
    volumes:
      - maven-repo:/root/.m2 # Persist dependencies
    develop:
      watch:
        - action: sync+restart
          path: ./order-service/src
          target: /app/src
        - action: rebuild
          path: ./order-service/pom.xml
    ports:
      - "${ORDER_PORT:-8083}:${ORDER_PORT:-8083}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ORDER_PORT: ${ORDER_PORT:-8083}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      RABBIT_USER: ${RABBIT_USER}
      RABBIT_PASSWORD: ${RABBIT_PASSWORD}
    networks:
      - food-delivery-net
    depends_on:
      rabbitmq:
        condition: service_healthy
