spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/delivery_db
    username: ${POSTGRES_USER}
    password: ${DB_PASSWORD}
  rabbitmq:
    host: rabbitmq
    username: ${RABBIT_USER}
    password: ${RABBIT_PASSWORD}

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
