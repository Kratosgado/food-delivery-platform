name: Customer Service Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'customer-service/**'
      - '.github/workflows/customer-service-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'customer-service/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: customer_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn clean test -f customer-service/pom.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-service-test-results
          path: customer-service/target/surefire-reports/
          retention-days: 30
