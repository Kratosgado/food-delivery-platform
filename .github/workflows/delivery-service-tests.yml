name: Delivery Service Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'delivery-service/**'
      - '.github/workflows/delivery-service-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'delivery-service/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: delivery_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd rabbitmq-diagnostics\ -q\ ping
          --health-interval 15s
          --health-timeout 10s
          --health-retries 5
        ports:
          - 5672:5672

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn clean test -f delivery-service/pom.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: delivery-service-test-results
          path: delivery-service/target/surefire-reports/
          retention-days: 30
